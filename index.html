<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T9 CAPTCHA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    min-height:100vh;
    background:linear-gradient(135deg,#a8d8f0 0%,#c9a8f0 30%,#f0a8c9 60%,#d4a8f0 100%);
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }
  .screen { display:none; width:100%; height:100vh; align-items:center; justify-content:center; }
  .wrap { position:relative; display:inline-block; line-height:0; max-height:96vh; max-width:96vw; }
  .wrap > .base { display:block; max-height:96vh; max-width:96vw; width:auto; height:auto; }

  /* SCREEN 1 */
  #begin-hit {
    position:absolute; left:36%; top:71%; width:27%; height:11%;
    background:transparent; border:none; cursor:pointer; z-index:5; border-radius:24px;
  }

  /* SCREEN 2 */
  #razr-vibe { position:absolute; left:63%; top:24%; width:35.5%; height:73%; overflow:hidden; pointer-events:none; z-index:3; }
  #razr-vibe img { position:absolute; width:281.7%; height:auto; left:-177.5%; top:-32.9%; max-width:none; display:block; }
  @keyframes vibrate {
    0%,100%{transform:translate(0,0);} 10%{transform:translate(-4px,-2px);} 20%{transform:translate(4px,2px);}
    30%{transform:translate(-3px,1px);} 40%{transform:translate(3px,-1px);} 50%{transform:translate(-2px,2px);}
    60%{transform:translate(2px,-2px);} 70%{transform:translate(-2px,1px);} 80%{transform:translate(2px,-1px);} 90%{transform:translate(0,0);}
  }
  #razr-vibe.vibrating img { animation:vibrate 0.25s linear infinite; }
  #open-star-btn {
    position:absolute; left:73%; top:5%; width:24%; height:29.6%;
    background:transparent; border:none; cursor:pointer; z-index:10;
  }
  #open-star-btn:hover { filter:brightness(1.15) drop-shadow(0 0 8px rgba(255,255,255,0.8)); }

  /* SCREEN 3 */
  /* White screen — pixel verified: x:662-850 y:28-230 in 892x686 */
  #razor-screen {
    position:absolute;
    left:74.215%; top:9.082%;
    width:21.076%; height:29.446%;
    display:flex; flex-direction:column;
    align-items:flex-start; justify-content:flex-start;
    padding:3% 4%;
    pointer-events:none; z-index:5; overflow:hidden;
  }
  #razor-typing-display {
    font-family:'Press Start 2P',monospace;
    font-size:10px;
    color:#111; word-break:break-all;
    white-space:pre-wrap; line-height:2; width:100%;
  }
  #t9-feedback {
    font-family:'Press Start 2P',monospace;
    font-size:clamp(4px,0.55vw,6px);
    color:#c0004a; margin-top:3px;
  }

  /* Back/Send — pixel verified */
  #btn-back {
    position:absolute; left:72.646%; top:51.02%; width:5.83%; height:3.644%;
    background:transparent; border:none; cursor:pointer; z-index:6; border-radius:3px;
  }
  #btn-send {
    position:absolute; left:88.565%; top:51.02%; width:6.726%; height:3.644%;
    background:transparent; border:none; cursor:pointer; z-index:6; border-radius:3px;
  }
  #btn-back:hover, #btn-send:hover { background:rgba(255,255,255,0.2); }
  #btn-back:active, #btn-send:active { background:rgba(255,255,255,0.4); }

  /* Keys — pixel-verified from cropped keypad image
     Each key: 54px wide (6.054%), 30px tall (4.373%)
     Columns: left=68.161%  mid=79.372%  right=89.462%
     Rows:    r1=62.682%  r2=67.784%  r3=72.595%  r4=77.697% */
  .r-key {
    position:absolute; background:transparent;
    border:none; cursor:pointer; z-index:5;
    border-radius:3px; transition:background 0.07s;
  }
  .r-key:hover   { background:rgba(255,255,255,0.22); }
  .r-key:active,
  .r-key.pressed { background:rgba(255,255,255,0.42); }

  /* SUCCESS */
  #screen-success {
    display:none; position:fixed; inset:0;
    background:linear-gradient(135deg,#a8d8f0 0%,#c9a8f0 30%,#f0a8c9 60%,#d4a8f0 100%);
    align-items:center; justify-content:center; z-index:100; flex-direction:column;
  }
  .success-text {
    font-family:'Press Start 2P',monospace; font-size:clamp(20px,4vw,40px);
    color:#111; text-align:center; line-height:1.7; z-index:2; position:relative;
    animation:pop-in 0.5s cubic-bezier(0.175,0.885,0.32,1.275) both;
  }
  @keyframes pop-in{0%{transform:scale(0);opacity:0;}100%{transform:scale(1);opacity:1;}}
  .deco { position:absolute; pointer-events:none; animation:spin linear infinite; }
  @keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
</style>
</head>

    <button class="r-key" style="left:82.493%;top:62.494%;width:4.54%;height:4.898%;" data-key="2" onclick="pressKey(2)"></button>

    <button class="r-key" style="left:76.559%;top:65.917%;width:4.54%;height:4.898%;" data-key="4" onclick="pressKey(4)"></button>

<!-- SUCCESS -->
<div id="screen-success">
  <div class="success-text">Yay ur not<br>a robot!</div>
</div>

<script>
const T9 = {
  1:[".",",","!","?","'"],
  2:["a","b","c"], 3:["d","e","f"], 4:["g","h","i"],
  5:["j","k","l"], 6:["m","n","o"], 7:["p","q","r","s"],
  8:["t","u","v"], 9:["w","x","y","z"], 0:[" "]
};
const CORRECT = "omg yes she shaved her head";
let typed="", buf={key:null,idx:0,timer:null};

function show(id){
  ["screen-intro","screen-closed","screen-open"].forEach(s=>document.getElementById(s).style.display="none");
  document.getElementById(id).style.display="flex";
}
function goToChallenge(){
  show("screen-closed");
  setTimeout(()=>{
    const rv=document.getElementById("razr-vibe");
    rv.classList.add("vibrating");
    setTimeout(()=>rv.classList.remove("vibrating"),2500);
  },3000);
}
function openRazr(){
  show("screen-open"); typed=""; buf={key:null,idx:0,timer:null}; updateDisplay();
}
function updateDisplay(){
  let t=typed;
  if(buf.key!==null){ const c=T9[buf.key]||[]; t+=c[buf.idx%c.length]||""; }
  document.getElementById("razor-typing-display").textContent=t+"▋";
  document.getElementById("t9-feedback").textContent="";
}
function commit(){
  if(buf.timer){clearTimeout(buf.timer);buf.timer=null;}
  if(buf.key!==null){ const c=T9[buf.key]||[]; typed+=c[buf.idx%c.length]||""; buf={key:null,idx:0,timer:null}; }
}
function pressKey(key){
  if(key==="*"){ commit(); typed+=" "; updateDisplay(); return; }
  if(key==="#"){ if(buf.key!==null){ clearTimeout(buf.timer); buf.idx++; buf.timer=setTimeout(commit,1000); updateDisplay(); } return; }
  const k=parseInt(key);
  if(!(k in T9)) return;
  if(k===0){ commit(); typed+=" "; updateDisplay(); return; }
  if(buf.key===k){ clearTimeout(buf.timer); buf.idx++; } else { commit(); buf.key=k; buf.idx=0; }
  buf.timer=setTimeout(commit,1000); updateDisplay();
  document.querySelectorAll('[data-key="'+k+'"]').forEach(b=>{b.classList.add("pressed");setTimeout(()=>b.classList.remove("pressed"),130);});
}
function t9Back(){
  if(buf.key!==null){clearTimeout(buf.timer);buf={key:null,idx:0,timer:null};} else {typed=typed.slice(0,-1);}
  updateDisplay();
}
function t9Send(){
  commit();
  const normalized=typed.trim().toLowerCase().replace(/\s+/g," ");
  if(normalized===CORRECT){
    const display=document.getElementById("razor-typing-display");
    const fb=document.getElementById("t9-feedback");
    display.style.fontSize="8px";
    display.style.color="#4a8c3f";
    display.style.lineHeight="1.8";
    display.textContent="Yay! you're not a robot. You can come on in!";
    fb.textContent="";
  }
  else{ const fb=document.getElementById("t9-feedback"); fb.textContent="wrong! try again :("; setTimeout(()=>fb.textContent="",2200); }
}
function showSuccess(){
  const ss=document.getElementById("screen-success"); ss.style.display="flex";
  ["★","♥","✦","★","♥","✦","★","♥","✦","★","♥","✦","★","♥","✦","★","♥","✦","★","♥"].forEach(d=>{
    const s=document.createElement("span"); s.className="deco"; s.textContent=d;
    s.style.left=(5+Math.random()*90)+"%"; s.style.top=(5+Math.random()*90)+"%";
    s.style.fontSize=(20+Math.random()*44)+"px"; s.style.animationDuration=(1.5+Math.random()*2.5)+"s";
    s.style.animationDelay=(Math.random()*0.8)+"s";
    s.style.color=["#e0006a","#c9a8f0","#7ec862","#ffaacc","#111","#ff6ec7"][Math.floor(Math.random()*6)];
    ss.appendChild(s);
  });
}
</script>
