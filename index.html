    <button class="rkey" style="left:87.832%;top:62.494%;width:4.54%;height:4.898%;" data-key="3" onclick="pk(3)"></button>
    <button class="rkey" style="left:76.559%;top:65.917%;width:4.54%;height:4.898%;" data-key="4" onclick="pk(4)"></button>
    <button class="rkey" style="left:82.493%;top:65.917%;width:4.54%;height:4.898%;" data-key="5" onclick="pk(5)"></button>
    <button class="rkey" style="left:87.832%;top:65.917%;width:4.54%;height:4.898%;" data-key="6" onclick="pk(6)"></button>
    <button class="rkey" style="left:76.559%;top:69.146%;width:4.54%;height:4.898%;" data-key="7" onclick="pk(7)"></button>
    <button class="rkey" style="left:82.493%;top:69.146%;width:4.54%;height:4.898%;" data-key="8" onclick="pk(8)"></button>
    <button class="rkey" style="left:87.832%;top:69.146%;width:4.54%;height:4.898%;" data-key="9" onclick="pk(9)"></button>
    <button class="rkey" style="left:76.559%;top:72.567%;width:4.54%;height:4.898%;" onclick="pk('*')"></button>
    <button class="rkey" style="left:82.493%;top:72.567%;width:4.54%;height:4.898%;" data-key="0" onclick="pk(0)"></button>
    <button class="rkey" style="left:87.832%;top:72.567%;width:4.54%;height:4.898%;" onclick="pk('#')"></button>
  </div>
</div>

<script>
const T9 = {
  1:[".",",","!","?","'"],
  2:["a","b","c"],3:["d","e","f"],4:["g","h","i"],
  5:["j","k","l"],6:["m","n","o"],7:["p","q","r","s"],
  8:["t","u","v"],9:["w","x","y","z"],0:[" "]
};

var scen = "a";
var correct = "omg yes she shaved her head";
var aTyp = null, aFb = null;
var typed = "", buf = {k:null,i:0,t:null};
var screens = ["sca","soa","scb","sob"];

function showOnly(id) {
  for (var i=0;i<screens.length;i++) document.getElementById(screens[i]).style.display="none";
  document.getElementById(id).style.display="flex";
}

function openRazr(s) {
  showOnly("so"+s);
  aTyp = document.getElementById("t"+s);
  aFb  = document.getElementById("f"+s);
  // Reset text styling
  aTyp.style.fontSize="5px";
  aTyp.style.color="#111";
  aTyp.style.lineHeight="1.8";
  typed=""; buf={k:null,i:0,t:null};
  redraw();
}

// Use a hidden span to measure actual rendered text widths
var _testSpan = null;
function getSpan() {
  if (!_testSpan) {
    _testSpan = document.createElement('span');
    _testSpan.style.cssText = 'position:absolute;visibility:hidden;white-space:nowrap;font-family:\'Press Start 2P\',monospace;font-size:6px;';
    document.body.appendChild(_testSpan);
  }
  return _testSpan;
}
function wrapWords(text, el) {
  var sp = getSpan();
  var maxW = el.offsetWidth - 4;
  if (maxW < 5) maxW = 50;
  var words = text.split(' ');
  var lines = [];
  var line = '';
  for (var i = 0; i < words.length; i++) {
    var word = words[i];
    var test = line ? line + ' ' + word : word;
    sp.textContent = test;
    if (sp.offsetWidth <= maxW) {
      line = test;
    } else {
      if (line) lines.push(line);
      line = word;
    }
  }
  if (line) lines.push(line);
  el.innerHTML = lines.join('<br>');
}
function redraw() {
  if (!aTyp) return;
  var t = typed;
  if (buf.k!==null) { var c=T9[buf.k]||[]; t+=c[buf.i%c.length]||""; }
  wrapWords(t + "\u258b", aTyp);
}

function commit() {
  if (buf.t) { clearTimeout(buf.t); buf.t=null; }
  if (buf.k!==null) { var c=T9[buf.k]||[]; typed+=c[buf.i%c.length]||""; buf={k:null,i:0,t:null}; }
}

function pk(key) {
  if (key==="*") { commit(); typed+=" "; redraw(); return; }
  if (key==="#") { if(buf.k!==null){ clearTimeout(buf.t); buf.i++; buf.t=setTimeout(commit,1000); redraw(); } return; }
  var k=parseInt(key);
  if (!(k in T9)) return;
  if (k===0) { commit(); typed+=" "; redraw(); return; }
  if (buf.k===k) { clearTimeout(buf.t); buf.i++; } else { commit(); buf.k=k; buf.i=0; }
  buf.t=setTimeout(commit,1000); redraw();
  document.querySelectorAll('[data-key="'+k+'"]').forEach(function(b){
    b.style.background="rgba(255,255,255,0.4)";
    setTimeout(function(){b.style.background="transparent";},130);
  });
}

function doBack() {
  if (buf.k!==null) { clearTimeout(buf.t); buf={k:null,i:0,t:null}; } else { typed=typed.slice(0,-1); }
  redraw();
}

function doSend() {
  commit();
  var norm = typed.trim().toLowerCase().replace(/\s+/g," ");
  if (norm===correct) {
    if (scen==="a") {
      // Show success text on open Razr A screen
      aTyp.style.fontSize="5px";
      aTyp.style.color="#4a8c3f";
      aTyp.style.lineHeight="1.8";
          wrapWords("Yay let's do it again", aTyp, 4);
      if(aFb) aFb.textContent="";
      // After 2.5 seconds, close the phone (show closed Razr A)
      setTimeout(function() {
        showOnly("sca");
        // After a brief moment, switch to scenario B closed phone and vibrate
        setTimeout(function() {
          scen="b";
          correct="lol ya fire crotch";
          typed="";
          buf={k:null,i:0,t:null};
          var tb=document.getElementById("tb");
          wrapWords("\u258b", tb);
          tb.style.fontSize="5px";
          tb.style.color="#111";
          tb.style.lineHeight="1.8";
          tb.style.whiteSpace="normal";
          document.getElementById("fb").textContent="";
          showOnly("scb");
          // Vibrate the closed Razr B right away
          var v=document.getElementById("vibe-b");
          v.classList.add("vibrating");
          setTimeout(function(){v.classList.remove("vibrating");},2500);
        },600);
      },2500);
    } else {
      aTyp.style.fontSize="5px";
      aTyp.style.color="#4a8c3f";
      aTyp.style.lineHeight="1.8";
          wrapWords("Yay! you're not a robot. You can come on in!", aTyp);
      if(aFb) aFb.textContent="";
    }
  } else {
    if(aFb){
      aFb.textContent="wrong! try again :(";
      setTimeout(function(){aFb.textContent="";},2200);
    }
  }
}

// Init
document.addEventListener("DOMContentLoaded", function() {
  for (var i=0;i<screens.length;i++) document.getElementById(screens[i]).style.display="none";
  showOnly("sca");
  setTimeout(function(){
    var v=document.getElementById("vibe-a");
    v.classList.add("vibrating");
    setTimeout(function(){v.classList.remove("vibrating");},2500);
  },3000);
});
</script>
</body>
</html>
